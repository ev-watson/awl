name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Check dispatch cost report
        run: python3 scripts/dispatch_cost_report.py --logs-dir target/no-dispatches

      - name: Optional local dispatch eval
        if: env.AWL_RUN_DISPATCH_EVAL == '1'
        run: |
          if ! command -v ollama >/dev/null 2>&1; then
            echo "Ollama is not installed; skipping dispatch eval"
            exit 0
          fi
          scripts/dispatch_eval.sh

      - name: Package dry run
        if: matrix.os == 'ubuntu-latest'
        run: cargo package --locked --no-verify --list
