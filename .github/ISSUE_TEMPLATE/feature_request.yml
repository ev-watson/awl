name: Feature request
description: Suggest a change that would improve Awl.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Constraints, hardware limits, or related projects/issues.
